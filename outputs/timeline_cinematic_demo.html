<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline Motion Demo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Microsoft YaHei','PingFang SC',-apple-system,sans-serif;
  background:#000; overflow:hidden; height:100vh;
  user-select:none; -webkit-user-select:none;
  color:#fff;
}

/* ============================================================
   SCENE CONTAINER
   ============================================================ */
.scene {
  position:fixed; inset:0; z-index:1;
  display:flex; align-items:center; justify-content:center;
}
#bg { position:fixed; inset:0; z-index:0; transition:background 1.2s cubic-bezier(0.4,0,0.2,1); }
#orb { position:fixed; border-radius:50%; filter:blur(80px); z-index:0; pointer-events:none;
  transition:all 1.5s cubic-bezier(0.4,0,0.2,1); }

/* ============================================================
   SVG STAGE
   ============================================================ */
#stage {
  position:fixed; inset:0; z-index:2;
  width:100%; height:100%;
}
/* Curve layers animate 'd' attribute */
.curve-morph { transition: d 1s cubic-bezier(0.34,0,0.2,1); }

/* ============================================================
   COVER OVERLAY
   ============================================================ */
#cover {
  position:fixed; inset:0; z-index:50; display:flex; flex-direction:column;
  align-items:center; justify-content:center; text-align:center;
  transition:opacity 0.7s, transform 0.7s;
}
#cover.hidden { opacity:0; pointer-events:none; transform:scale(1.04); }
#cover h1 { font-size:3.2em; font-weight:700; letter-spacing:.06em;
  text-shadow:0 0 80px rgba(0,176,240,.4); margin-bottom:10px; }
#cover p { font-size:1.2em; color:rgba(255,255,255,.5); margin-bottom:44px; }
#cover button {
  pointer-events:all; background:none; border:1px solid rgba(255,255,255,.25);
  color:#fff; padding:13px 44px; font-size:1em; letter-spacing:.12em;
  cursor:pointer; transition:all .35s; font-family:inherit;
}
#cover button:hover { border-color:#00B0F0; box-shadow:0 0 36px rgba(0,176,240,.25); }

/* ============================================================
   NAV
   ============================================================ */
#nav { position:fixed; right:22px; top:50%; transform:translateY(-50%); z-index:60;
  display:flex; flex-direction:column; gap:10px; }
#nav span { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.2);
  cursor:pointer; transition:all .3s; }
#nav span.on { background:#00B0F0; box-shadow:0 0 10px rgba(0,176,240,.5); transform:scale(1.35); }
#counter { position:fixed; left:36px; bottom:36px; z-index:60;
  font-size:.8em; color:rgba(255,255,255,.25); letter-spacing:.08em; }

/* ============================================================
   KEYFRAMES — entrance animations
   ============================================================ */
@keyframes flyFromLeft {
  0%   { transform:translateX(-180px); opacity:0; }
  100% { transform:translateX(0); opacity:1; }
}
@keyframes flyFromRight {
  0%   { transform:translateX(180px); opacity:0; }
  100% { transform:translateX(0); opacity:1; }
}
@keyframes flyFromBottom {
  0%   { transform:translateY(120px); opacity:0; }
  100% { transform:translateY(0); opacity:1; }
}
@keyframes scaleIn {
  0%   { transform:scale(0.3); opacity:0; }
  60%  { transform:scale(1.08); opacity:1; }
  100% { transform:scale(1); opacity:1; }
}
@keyframes fadeUp {
  0%   { transform:translateY(30px); opacity:0; }
  100% { transform:translateY(0); opacity:1; }
}
@keyframes revealRight {
  0%   { clip-path:inset(0 100% 0 0); }
  100% { clip-path:inset(0 0 0 0); }
}
@keyframes breathe {
  0%,100% { transform:scale(1); opacity:.7; }
  50%     { transform:scale(1.04); opacity:1; }
}
@keyframes dotPulse {
  0%,100% { r:5.5; opacity:.7; }
  50%     { r:8; opacity:1; }
}
@keyframes ringExpand {
  0%,100% { r:9; opacity:.3; }
  50%     { r:18; opacity:.08; }
}
@keyframes arrowFlow {
  0%   { transform:translateX(0); opacity:.3; }
  100% { transform:translateX(16px); opacity:.6; }
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="orb"></div>

<svg id="stage" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Curve ribbon gradient -->
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0950F9" stop-opacity=".3"/>
      <stop offset="25%" stop-color="#0070C0" stop-opacity=".75"/>
      <stop offset="55%" stop-color="#00B0F0" stop-opacity="1"/>
      <stop offset="85%" stop-color="#0070C0" stop-opacity=".75"/>
      <stop offset="100%" stop-color="#0950F9" stop-opacity=".3"/>
    </linearGradient>

    <!-- Background split gradients -->
    <linearGradient id="bgTopG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/><stop offset="100%" stop-color="#0d1a40"/>
    </linearGradient>
    <linearGradient id="bgBotG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2E2E2"/><stop offset="100%" stop-color="#d5d8dc"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glowLg"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="glowSm"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="blur60"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="heroShadow"><feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="rgba(0,0,0,.4)"/></filter>
  </defs>

  <!-- === BACKGROUND === -->
  <!-- Upper section -->
  <rect id="bgTop" x="0" y="0" width="1440" height="460" fill="url(#bgTopG)"/>
  <!-- Lower section -->
  <rect id="bgBot" x="0" y="460" width="1440" height="440" fill="url(#bgBotG)"/>

  <!-- === HERO GEOMETRIC OBJECT (the visual anchor) === -->
  <g id="hero" filter="url(#heroShadow)">
    <!-- Crystal body -->
    <path id="heroBody" d="" fill="rgba(0,112,192,.22)" stroke="rgba(0,176,240,.5)" stroke-width="2"/>
    <!-- Sharp upper edge -->
    <path id="heroEdge" d="" fill="rgba(0,176,240,.18)" stroke="rgba(0,176,240,.4)" stroke-width="1"/>
    <!-- Highlight line -->
    <path id="heroLine" d="" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
    <!-- Core glow dot -->
    <circle id="heroCore" cx="0" cy="0" r="0" fill="#00B0F0" opacity="0" filter="url(#glowSm)"/>
  </g>

  <!-- === CURVE (horizontal sweep, divides the page) === -->
  <g>
    <!-- 5 layers = luminous ribbon -->
    <path id="c1" class="curve-morph" d="" stroke="url(#cg)" stroke-width="34" fill="none" opacity=".06" filter="url(#glowLg)"/>
    <path id="c2" class="curve-morph" d="" stroke="url(#cg)" stroke-width="14" fill="none" opacity=".14" filter="url(#glowLg)"/>
    <path id="c3" class="curve-morph" d="" stroke="url(#cg)" stroke-width="5" fill="none" opacity=".4" filter="url(#glowSm)"/>
    <path id="c4" class="curve-morph" d="" stroke="url(#cg)" stroke-width="2" fill="none" opacity=".65"/>
    <path id="c5" class="curve-morph" d="" stroke="rgba(255,255,255,.28)" stroke-width=".8" fill="none"/>
  </g>

  <!-- === NODES ON CURVE === -->
  <g id="nodesLayer"></g>

  <!-- === FLOW ARROWS === -->
  <g id="arrowsLayer"></g>

  <!-- === TITLE === -->
  <g id="titleLayer">
    <text id="titleTxt" x="70" y="75" font-size="42" font-weight="700" fill="#fff" letter-spacing="3"
          font-family="'Microsoft YaHei','PingFang SC',sans-serif"/>
    <text id="titleSub" x="72" y="108" font-size="14" fill="rgba(255,255,255,.38)" letter-spacing="5"
          font-family="'Microsoft YaHei','PingFang SC',sans-serif"/>
  </g>
</svg>

<div id="cover">
  <h1>星辰科技 · 十年征途</h1>
  <p>从共享办公室到全球行业领航者</p>
  <button onclick="start()">开 始 探 索</button>
</div>

<div id="nav"></div>
<div id="counter">0 / 6</div>

<script>
// ===================================================================
// SLIDE DATA
// Each slide defines: hero shape, curve path, nodes, background, timing
// ===================================================================

// Hero shape builders
function crystal(w, h, cx) { return {
  body: `M${cx},40 L${cx+w/2},${h} L${cx},${h+60} L${cx-w/2},${h} Z`,
  edge: `M${cx},40 L${cx+w/2},${h} L${cx},${h+60}`,
  line: `M${cx},40 L${cx},${h+60}`,
  coreCx: cx, coreCy: h/2, coreR: 4,
};}

function triangle(w, h, cx) { return {
  body: `M${cx-50},60 L${cx+w/2+20},${h+40} L${cx-w/2-20},${h+40} Z`,
  edge: `M${cx-50},60 L${cx+w/2+20},${h+40}`,
  line: `M${cx-50},60 L${cx},${h+40}`,
  coreCx: cx-10, coreCy: h/2+20, coreR: 3,
};}

function wave(w, h, cx) { return {
  body: `M${cx-80},80 C${cx-30},${h*.3} ${cx+30},${h*.5} ${cx+80},${h+50} C${cx+50},${h*.4} ${cx-20},${h*.2} ${cx-80},80Z`,
  edge: `M${cx-80},80 C${cx-30},${h*.3} ${cx+30},${h*.5} ${cx+80},${h+50}`,
  line: '',
  coreCx: cx-30, coreCy: h/2-20, coreR: 0,
};}

const slides = [
  { // 0: cover
    hero:null, heroAnim:null, curve:'', bgTop:['#0a0e27','#0d1440'], bgBot:['#1a1a2e','#16213e'],
    orb:{cx:1150,cy:120,rx:500,ry:320}, splitY:460,
    nodes:[], arrows:[], title:'', sub:'',
  },
  { // 1: 初创 — Crystal flies in from LEFT
    hero:crystal(180,380,240),
    heroAnim:{enter:'flyFromLeft', duration:'1s', delay:'0.3s', easing:'cubic-bezier(0.22,0,0,1)'},
    curve:'M40,470 C150,460 280,440 420,450 C560,460 700,455 840,465 C980,475 1120,460 1260,465 C1350,468 1390,470 1400,470',
    bgTop:['#0a0e27','#0d1a40'], bgBot:['#E2E2E2','#d5d8dc'],
    orb:{cx:260,cy:250,rx:380,ry:300}, splitY:462,
    title:'第一章 · 从零到一', sub:'2015 — 2017',
    nodes:[
      {x:280,y:450,up:1, yr:'2015', ev:'3人创立于\n共享办公室'},
      {x:440,y:452,up:0, yr:'2016', ev:'首款产品\n6个月上线'},
      {x:620,y:458,up:1, yr:'2017', ev:'A轮融资\n团队扩至50人'},
      {x:800,y:462,up:0, yr:'2018', ev:'营收突破\n1亿元'},
    ],
    arrows:[{x:160,y:465},{x:720,y:458},{x:1200,y:466}]
  },
  { // 2: 增长 — Crystal scales into center
    hero:crystal(220,420,620),
    heroAnim:{enter:'scaleIn', duration:'.9s', delay:'0.2s', easing:'cubic-bezier(0.34,1.56,0.64,1)'},
    curve:'M40,470 C160,460 320,435 460,420 C600,405 740,430 880,448 C1020,466 1160,452 1300,458 C1370,460 1390,462 1400,462',
    bgTop:['#0d1440','#101d44'], bgBot:['#d9dce0','#cfd3d8'],
    orb:{cx:700,cy:220,rx:440,ry:320}, splitY:450,
    title:'第二章 · 高速增长', sub:'2018 — 2021',
    nodes:[
      {x:200,y:452,up:1, yr:'Q1', ev:'营收增长\n70% YoY'},
      {x:380,y:425,up:0, yr:'Q2', ev:'客户突破\n5000家'},
      {x:540,y:412,up:1, yr:'Q3', ev:'市场份额\n跃居前3'},
      {x:700,y:422,up:0, yr:'Q4', ev:'C轮融资\n估值50亿'},
      {x:880,y:442,up:1, yr:'Q5', ev:'亚太区\n排名第一'},
    ],
    arrows:[{x:120,y:466},{x:620,y:416},{x:1300,y:460}]
  },
  { // 3: 技术 — Wave enters from RIGHT
    hero:wave(200,400,720),
    heroAnim:{enter:'flyFromRight', duration:'1s', delay:'0.25s', easing:'cubic-bezier(0.22,0,0,1)'},
    curve:'M40,470 C150,455 280,440 420,430 C560,418 700,440 840,450 C980,460 1120,442 1260,448 C1360,452 1390,455 1400,456',
    bgTop:['#0a0e27','#0f1740'], bgBot:['#E2E2E2','#d8dce0'],
    orb:{cx:900,cy:180,rx:460,ry:300}, splitY:446,
    title:'第三章 · 技术壁垒', sub:'核心知识产权体系',
    nodes:[
      {x:200,y:448,up:1, yr:'AI引擎', ev:'星核1.0发布\n性能提升3倍'},
      {x:380,y:432,up:0, yr:'硬件', ev:'全栈国产化\n打破技术垄断'},
      {x:560,y:420,up:1, yr:'专利', ev:'500+发明\n授权率第一'},
      {x:740,y:438,up:0, yr:'研发', ev:'累计投入\n超10亿元'},
      {x:920,y:448,up:1, yr:'生态', ev:'开放平台\n万级伙伴'},
    ],
    arrows:[{x:100,y:468},{x:680,y:436},{x:1350,y:454}]
  },
  { // 4: 转折 — Triangle enters from BOTTOM, curve dips
    hero:triangle(240,360,560),
    heroAnim:{enter:'flyFromBottom', duration:'1s', delay:'0.2s', easing:'cubic-bezier(0.22,0,0,1)'},
    curve:'M40,470 C180,460 340,480 460,500 C580,520 660,490 770,465 C880,440 1000,450 1120,458 C1240,466 1340,462 1400,460',
    bgTop:['#0a0e27','#0d1838'], bgBot:['#d4d7dc','#cdd0d5'],
    orb:{cx:520,cy:320,rx:480,ry:350}, splitY:480,
    title:'第四章 · 战略转折', sub:'2023 — 2024',
    nodes:[
      {x:200,y:462,up:1, yr:'挑战', ev:'行业增速\n骤降至5%'},
      {x:380,y:478,up:0, yr:'危机', ev:'毛利率\n45%→28%'},
      {x:520,y:502,up:1, yr:'决策', ev:'放弃30%\n成熟业务'},
      {x:680,y:480,up:0, yr:'转型', ev:'产品→生态\n平台驱动'},
      {x:860,y:448,up:1, yr:'新生', ev:'10倍增长\n空间打开'},
    ],
    arrows:[{x:120,y:466},{x:760,y:465},{x:1320,y:460}]
  },
  { // 5: 未来 — Crystal enters from LEFT, rises
    hero:crystal(240,460,1180),
    heroAnim:{enter:'flyFromLeft', duration:'1.1s', delay:'0.15s', easing:'cubic-bezier(0.22,0,0,1)'},
    curve:'M40,470 C180,458 340,440 480,425 C620,410 780,400 940,415 C1100,430 1220,450 1320,460 C1370,464 1390,466 1400,468',
    bgTop:['#070b1f','#0d1740'], bgBot:['#d0d4d8','#c8ccd1'],
    orb:{cx:1100,cy:250,rx:500,ry:380}, splitY:448,
    title:'第五章 · 领航未来', sub:'2025 — 2030',
    nodes:[
      {x:200,y:455,up:1, yr:'2025', ev:'进入欧美\n核心市场'},
      {x:400,y:435,up:0, yr:'2026', ev:'AI全场景\n智能化落地'},
      {x:560,y:418,up:1, yr:'2027', ev:'海外营收\n占比达40%'},
      {x:740,y:408,up:0, yr:'2028', ev:'全球TOP5\n行业标杆'},
      {x:920,y:418,up:1, yr:'2030', ev:'年营收\n突破200亿'},
    ],
    arrows:[{x:120,y:466},{x:660,y:408},{x:1320,y:462}]
  },
  { // 6: 终章 — gentle crystal
    hero:crystal(160,340,720),
    heroAnim:{enter:'scaleIn', duration:'1s', delay:'0.3s', easing:'cubic-bezier(0.22,0,0,1)'},
    curve:'M40,465 C200,460 380,470 560,465 C740,460 920,470 1100,465 C1280,460 1360,462 1400,464',
    bgTop:['#0a0e27','#0d1a40'], bgBot:['#1a2040','#121830'],
    orb:{cx:700,cy:200,rx:550,ry:380}, splitY:465,
    title:'携手共进 · 下一个十年', sub:'星辰伙伴计划',
    nodes:[
      {x:200,y:462,up:1, yr:'星辰', ev:'伙伴计划\n正式启动'},
      {x:460,y:467,up:0, yr:'开放', ev:'技术平台\n与市场资源'},
      {x:720,y:463,up:1, yr:'共建', ev:'首年零门槛\n优先技术支持'},
      {x:980,y:467,up:0, yr:'共赢', ev:'成为下一个\n十年共建者'},
    ],
    arrows:[{x:120,y:464},{x:1340,y:463}]
  }
];

// ===================================================================
// ENGINE
// ===================================================================
let cur=-1, busy=false, cv=true;
const NS='http://www.w3.org/2000/svg';

function el(id){ return document.getElementById(id); }

// Set all 5 curve layers + apply path to each
function setCurve(d){ ['c1','c2','c3','c4','c5'].forEach(id=>{ el(id).setAttribute('d',d); }); }

// Set hero shape with entrance animation
function setHero(s){
  const g=el('hero');
  if(!s.hero){ g.setAttribute('opacity','0'); return; }
  const h=s.hero;
  el('heroBody').setAttribute('d',h.body);
  el('heroEdge').setAttribute('d',h.edge);
  el('heroLine').setAttribute('d',h.line||'');
  el('heroCore').setAttribute('cx',h.coreCx);
  el('heroCore').setAttribute('cy',h.coreCy);
  el('heroCore').setAttribute('r',h.coreR||0);
  el('heroCore').setAttribute('opacity',h.coreR?'.8':'0');

  // Apply entrance animation
  g.setAttribute('opacity','1');
  const a=s.heroAnim;
  g.style.animation='none';
  g.offsetHeight; // force reflow
  g.style.animation=a.enter+' '+a.duration+' '+a.delay+' '+a.easing+' forwards';
  g.style.transformOrigin=String(s.hero.coreCx||400)+'px '+(s.hero.coreCy||250)+'px';
}

function setBg(s){
  // Top gradient
  const stops=el('bgTopG').querySelectorAll('stop');
  stops[0].setAttribute('stop-color',s.bgTop[0]);
  stops[1].setAttribute('stop-color',s.bgTop[1]);
  // Bottom gradient
  const bstops=el('bgBotG').querySelectorAll('stop');
  bstops[0].setAttribute('stop-color',s.bgBot[0]);
  bstops[1].setAttribute('stop-color',s.bgBot[1]);
  // Split position
  el('bgTop').setAttribute('height',s.splitY);
  el('bgBot').setAttribute('y',s.splitY);
  el('bgBot').setAttribute('height',900-s.splitY);
  // Orb
  el('orb').style.cssText='top:'+(s.orb.cy-s.orb.ry)+'px;left:'+(s.orb.cx-s.orb.rx)+'px;'+
    'width:'+(s.orb.rx*2)+'px;height:'+(s.orb.ry*2)+'px;'+
    'background:radial-gradient(ellipse, rgba(9,80,249,.2) 0%, transparent 70%)';
  // Global bg
  el('bg').style.background='#'+s.bgTop[0].replace('#','');
}

function renderNodes(nodes){
  const g=el('nodesLayer'); g.innerHTML='';
  nodes.forEach((n,i)=>{
    const gg=document.createElementNS(NS,'g');
    gg.style.opacity='0';
    gg.style.animation='fadeUp 0.6s '+(i*0.1+0.4)+'s cubic-bezier(0.22,0,0,1) forwards';
    const ly=n.up?n.y-60:n.y+22;

    gg.innerHTML=
      // Connector
      '<line x1="'+n.x+'" y1="'+n.y+'" x2="'+n.x+'" y2="'+(n.up?n.y-55:n.y+55)+
        '" stroke="rgba(0,176,240,.18)" stroke-width=".8" stroke-dasharray="3,4"/>'+
      // Glow ring
      '<circle cx="'+n.x+'" cy="'+n.y+'" r="10" fill="none" stroke="rgba(0,176,240,.2)" stroke-width="1.2" opacity=".5">'+
        '<animate attributeName="r" values="10;18;10" dur="2.5s" repeatCount="indefinite"/>'+
        '<animate attributeName="opacity" values=".5;.08;.5" dur="2.5s" repeatCount="indefinite"/>'+
      '</circle>'+
      // Dot
      '<circle cx="'+n.x+'" cy="'+n.y+'" r="5.5" fill="url(#cg2)" stroke="#00B0F0" stroke-width=".5">'+
        '<animate attributeName="opacity" values=".6;1;.6" dur="2s" repeatCount="indefinite"/>'+
      '</circle>'+
      // Year
      '<text x="'+n.x+'" y="'+ly+'" font-size="11" font-weight="700" fill="#00B0F0" letter-spacing="2" text-anchor="middle"'+
        ' font-family="\'Microsoft YaHei\',\'PingFang SC\',sans-serif">'+n.yr+'</text>';

    n.ev.split('\n').forEach((line,li)=>{
      gg.innerHTML+='<text x="'+n.x+'" y="'+(ly+16+li*15)+'" font-size="10.5" fill="rgba(255,255,255,.8)" text-anchor="middle" letter-spacing="1"'+
        ' font-family="\'Microsoft YaHei\',\'PingFang SC\',sans-serif">'+line+'</text>';
    });
    g.appendChild(gg);
  });
}

function renderArrows(arrows){
  const g=el('arrowsLayer'); g.innerHTML='';
  arrows.forEach(a=>{
    const p=document.createElementNS(NS,'polygon');
    p.setAttribute('points',(a.x-7)+','+(a.y-4)+' '+(a.x+9)+','+a.y+' '+(a.x-7)+','+(a.y+4));
    p.setAttribute('fill','rgba(0,176,240,.35)');
    p.style.animation='fadeUp 0.5s 0.6s cubic-bezier(0.22,0,0,1) forwards';
    p.style.opacity='0';
    g.appendChild(p);
  });
}

function setTitle(s){
  el('titleTxt').textContent=s.title;
  el('titleSub').textContent=s.sub;
  const tg=el('titleLayer');
  if(s.title){ tg.style.opacity='1'; tg.style.animation='fadeUp 0.6s 0.2s cubic-bezier(0.22,0,0,1) forwards'; }
  else tg.style.opacity='0';
}

function goto(i){
  if(busy||i===cur||i<0||i>=slides.length) return;
  busy=true; cur=i; const s=slides[i];
  setBg(s); setHero(s); setCurve(s.curve); renderArrows(s.arrows); renderNodes(s.nodes); setTitle(s);
  document.querySelectorAll('#nav span').forEach((d,j)=>{ d.classList.toggle('on',j===i); });
  el('counter').textContent=(i+1)+' / '+(slides.length-1);
  setTimeout(()=>{ busy=false; },1200);
}

function start(){ el('cover').classList.add('hidden'); cv=false; goto(1); }

// Add missing gradient for dots
const defs=el('stage').querySelector('defs');
const dg=document.createElementNS(NS,'radialGradient');
dg.setAttribute('id','cg2');
dg.innerHTML='<stop offset="0%" stop-color="#00D4FF"/><stop offset="100%" stop-color="#0070C0"/>';
defs.appendChild(dg);

// Init
setBg(slides[0]); setCurve('M40,465 C400,460 800,470 1200,465 C1350,463 1390,462 1400,462');
el('hero').setAttribute('opacity','0'); el('titleLayer').style.opacity='0';
renderArrows([{x:300,y:464},{x:700,y:466},{x:1100,y:464}]);

// Nav
for(let i=1;i<slides.length;i++){
  const d=document.createElement('span');
  d.addEventListener('click',()=>goto(i));
  el('nav').appendChild(d);
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(cv){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); start(); } return; }
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){ e.preventDefault(); goto(cur+1); }
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){ e.preventDefault(); goto(cur-1); }
});

// Wheel
let wt;
document.addEventListener('wheel',e=>{
  if(cv||wt) return;
  wt=setTimeout(()=>{wt=null;},1100);
  if(e.deltaY>30) goto(cur+1); else if(e.deltaY<-30) goto(cur-1);
},{passive:true});

// Touch
let ty=0;
document.addEventListener('touchstart',e=>{ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(cv) return;
  const dy=ty-e.changedTouches[0].clientY;
  if(Math.abs(dy)>50){ if(dy>0) goto(cur+1); else goto(cur-1); }
});
</script>
</body>
